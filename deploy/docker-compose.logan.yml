services:
  openclaw-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    command: node dist/index.js gateway --bind loopback --port 18789
    init: true
    restart: unless-stopped
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SOKOSUMI_API_KEY=${SOKOSUMI_API_KEY:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama-local}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      # Optional: point Ollama at a host/sidecar (when not using cloud models)
      - OLLAMA_HOST=${OLLAMA_HOST:-}
    volumes:
      - ../openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ../workspace:/home/node/.openclaw/workspace
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      - SITE_DOMAIN=${SITE_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site/public:/site/public:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:

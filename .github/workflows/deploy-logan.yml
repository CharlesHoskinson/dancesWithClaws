name: Deploy Logan

on:
  push:
    branches: [main, custom]
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: "Branch to deploy (default main)"
        required: false
        default: "main"

# Automatic pushes only run smoke tests. Live Azure SSH deploy is manual
# (workflow_dispatch) so a down VM does not paint the fork red.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test deploy/tests/*.test.mjs

  deploy:
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LOGAN_VM_HOST }}
          username: ${{ secrets.LOGAN_VM_USER }}
          key: ${{ secrets.LOGAN_VM_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd /opt/logan/dancesWithClaws
            # Prefer requested branch, then main, then custom.
            BRANCH="${{ github.event.inputs.deploy_branch }}"
            if [ -z "$BRANCH" ]; then
              BRANCH=main
            fi
            if ! GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new' git fetch origin "$BRANCH"; then
              BRANCH=custom
              GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new' git fetch origin "$BRANCH"
            fi
            git checkout "$BRANCH"
            GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new' git pull origin "$BRANCH"
            cd deploy
            docker compose -f docker-compose.logan.yml build
            docker compose -f docker-compose.logan.yml up -d --remove-orphans
            docker image prune -f
